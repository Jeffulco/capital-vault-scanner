<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Vault</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: radial-gradient(circle at top, #15398f, #071532);
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* LOGO */
.logo img {
    width: 280px;
    margin: 20px 0;
}

/* SEARCH */
.search-box {
    border: 2px solid rgba(255,215,0,0.4);
    border-radius: 16px;
    padding: 12px;
}

.search-box.ready {
    border: 2px solid gold;
    box-shadow: 0 0 10px rgba(255,215,0,0.4);
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

.status {
    font-size: 12px;
    margin-top: 6px;
    color: gold;
}

/* TCG BUTTONS */
.tcg {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-top: 10px;
}

.tcg button {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid gold;
    background: transparent;
    color: white;
    font-size: 13px;
}

/* MAIN BUTTONS */
.btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid gold;
    background: transparent;
    color: white;
    font-size: 16px;
}

.footer {
    margin-top: 20px;
    font-size: 11px;
    opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
<img src="Logo.png">
</div>

<!-- SEARCH -->
<div id="box" class="search-box">
<input id="search" placeholder="Ex: Pikachu sv2a / OP01-120">
</div>

<div id="status" class="status"></div>

<!-- TCG -->
<div class="tcg">
<button>Pokémon</button>
<button>One Piece</button>
<button>Magic</button>
<button>Dragon Ball</button>
<button>Star Wars</button>
<button>Lorcana</button>
</div>

<!-- SOURCES -->
<button class="btn" onclick="openCM()">🔍 Cardmarket</button>
<button class="btn" onclick="openEbay()">💰 eBay Sold</button>
<button class="btn" onclick="openJP()">🇯🇵 CardRush</button>
<button class="btn" onclick="openYuyu()">🇯🇵 Yuyutei</button>

<div class="footer">Capital Vault Tool</div>

</div>

<script>

let query = "";

document.getElementById("search").addEventListener("input", function(){
    query = this.value.trim();

    if(query){
        document.getElementById("box").classList.add("ready");
        document.getElementById("status").innerText = "Recherche prête ✔️";
    } else {
        document.getElementById("box").classList.remove("ready");
        document.getElementById("status").innerText = "";
    }
});

function buildQuery(){
    return encodeURIComponent(query + " pokemon card");
}

function openCM(){
    window.open("https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString=" + buildQuery());
}

function openEbay(){
    window.open("https://www.ebay.fr/sch/i.html?_nkw=" + buildQuery() + "&LH_Sold=1&LH_Complete=1");
}

function openJP(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+cardrush");
}

function openYuyu(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+yuyutei");
}

</script>

</body>
</html>
