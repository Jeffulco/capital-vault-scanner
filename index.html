<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Vault</title>

<style>

body {
  margin:0;
  font-family:-apple-system,Arial;
  color:white;

  background:
    radial-gradient(circle at center,
      #0a2a6b 0%,
      #071f52 40%,
      #04163a 70%,
      #020b20 100%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity:0.12;
}

/* layout */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.top{
  text-align:center;
}

.logo{
  width:300px;
  margin:auto;
  display:block;
}

.intro{
  margin-top:10px;
  font-weight:600;
  font-size:18px;
  color:#ddd;
}

/* split */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.panel{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.3);
  border-radius:25px;
  padding:20px;
}

/* search */
.searchBox{
  border:2px solid rgba(255,215,0,0.5);
  border-radius:25px;
  padding:10px;
}

.searchRow{
  display:flex;
  gap:10px;
}

.searchRow input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  color:white;
}

.searchBtn{
  width:60px;
  border:none;
  border-radius:15px;
  background:gold;
  cursor:pointer;
}

/* tcg */
.tcg{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.tcg button{
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
}

.tcg .active{
  border:1px solid gold;
}

/* sources */
.source{
  border:2px solid rgba(255,215,0,0.5);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  cursor:pointer;
}

/* conversion */
.convert{
  margin-top:20px;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:20px;
}

.convertRow{
  display:grid;
  grid-template-columns:1fr auto 1fr auto 1fr;
  gap:10px;
  margin-top:10px;
  align-items:center;
}

.convert input, .result{
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
}

.op{
  font-size:20px;
  color:gold;
}

/* mobile */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <img src="Logo.png" class="logo">
    <div class="intro">Price Checker</div>
  </div>

  <div class="grid">

    <!-- LEFT -->
    <div class="panel">

      <div class="searchBox">
        <div class="searchRow">
          <input id="query" placeholder="Ex. Pikachu sv2a / OP01-120">
          <button class="searchBtn" onclick="prepare()">🔍</button>
        </div>
      </div>

      <div id="status" style="margin-top:10px;color:gold;"></div>

      <div class="tcg">
        <button class="active" onclick="select(this,'pokemon')">Pokémon</button>
        <button onclick="select(this,'onepiece')">One Piece</button>
        <button onclick="select(this,'magic')">Magic</button>
        <button onclick="select(this,'dbz')">Dragon Ball</button>
        <button onclick="select(this,'starwars')">Star Wars</button>
        <button onclick="select(this,'lorcana')">Lorcana</button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="panel">

      <div class="source" onclick="openCM()">🔎 Cardmarket</div>
      <div class="source" onclick="openEbay()">💰 eBay Sold</div>
      <div class="source" onclick="openJP()">JP CardRush</div>
      <div class="source" onclick="openYuyu()">JP Yuyutei</div>

      <div class="convert">
        <div>Conversion ¥ → €</div>

        <div class="convertRow">
          <input id="yen" placeholder="¥">
          <div class="op">÷</div>
          <input id="rate" value="160">
          <div class="op">=</div>
          <div id="eur" class="result">— €</div>
        </div>
      </div>

    </div>

  </div>

</div>

<script>

let tcg="pokemon";
let prepared="";

function select(el,value){
  document.querySelectorAll(".tcg button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  tcg=value;
}

function prepare(){
  let q=document.getElementById("query").value;
  if(!q)return;
  prepared=q;
  document.getElementById("status").innerText="Recherche prête ✔️";
}

function openCM(){
  if(!prepared)return;
  window.open("https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString="+prepared);
}

function openEbay(){
  if(!prepared)return;
  window.open("https://www.ebay.fr/sch/i.html?_nkw="+prepared+"&LH_Sold=1&LH_Complete=1");
}

function openJP(){
  if(!prepared)return;
  window.open("https://www.google.com/search?q="+prepared+" cardrush");
}

function openYuyu(){
  if(!prepared)return;
  window.open("https://www.google.com/search?q="+prepared+" yuyutei");
}

/* conversion */
function convert(){
  let y=parseFloat(document.getElementById("yen").value);
  let r=parseFloat(document.getElementById("rate").value);

  if(!isNaN(y)&&!isNaN(r)&&r>0){
    let e=y/r;
    document.getElementById("eur").innerText=e.toFixed(2)+" €";
  }
}

document.getElementById("yen").addEventListener("input",convert);
document.getElementById("rate").addEventListener("input",convert);

</script>

</body>
</html>
