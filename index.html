<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Vault</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#0d2c5a,#1a3f7a);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: gold;
    margin-bottom: 20px;
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
}

.ready {
    outline: 2px solid gold;
}

.button {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.cm { background: #2c6cff; color: white; }
.ebay { background: #28a745; color: white; }
.jp { background: #d9534f; color: white; }
.yuyu { background: purple; color: white; }

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">Capital Vault</div>

<input id="search" placeholder="Ex: Pikachu sv2a">

<button class="button cm" onclick="openCM()">🔍 Voir Cardmarket</button>
<button class="button ebay" onclick="openEbay()">💰 Voir ventes eBay</button>
<button class="button jp" onclick="openJP()">🇯🇵 CardRush</button>
<button class="button yuyu" onclick="openYuyu()">🇯🇵 Yuyutei</button>

<div class="status" id="status"></div>

</div>

<script>

let query = "";

document.getElementById("search").addEventListener("input", function(){
    query = this.value.trim();
    if(query){
        this.classList.add("ready");
        document.getElementById("status").innerText = "Recherche prête";
    } else {
        this.classList.remove("ready");
        document.getElementById("status").innerText = "";
    }
});

function buildQuery(){
    return encodeURIComponent(query + " pokemon card");
}

function openCM(){
    window.open("https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString=" + buildQuery());
}

function openEbay(){
    window.open("https://www.ebay.fr/sch/i.html?_nkw=" + buildQuery() + "&LH_Sold=1&LH_Complete=1");
}

function openJP(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+cardrush");
}

function openYuyu(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+yuyutei");
}

</script>

</body>
</html>
