<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Vault</title>

<style>
body {
  margin:0;
  font-family:-apple-system, Arial, sans-serif;
  color:white;

  /* ✅ TON BLEU CAPITAL VAULT */
  background: radial-gradient(
    circle at 50% 0%,
    #1a3f9c 0%,
    #0b2a73 35%,
    #071c4f 70%,
    #04122f 100%
  );
}

/* LAYOUT */
.container {
  display:flex;
  gap:20px;
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    flex-direction:column;
  }
}

/* PANELS */
.panel{
  flex:1;
  background:rgba(10,20,60,0.85);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,215,0,0.2);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:15px;
}
.logo img{
  width:280px;
}

/* INPUT */
.search-box{
  border:2px solid rgba(255,215,0,0.3);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
}

.search-row{
  display:flex;
  gap:10px;
}

.search-row input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.search-btn{
  width:60px;
  border:none;
  border-radius:12px;
  background:gold;
  font-size:20px;
}

/* TCG */
.tcg{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:15px 0;
}

.tcg button{
  padding:12px;
  border-radius:12px;
  border:1px solid gold;
  background:transparent;
  color:white;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:16px;
  border:2px solid gold;
  background:transparent;
  color:white;
  font-size:16px;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:12px;
  color:gold;
}

/* RESULT PANEL */
.result-box{
  margin-top:15px;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
}

/* CONVERSION */
.convert{
  margin-top:15px;
}
.convert input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:none;
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="panel">

<div class="logo">
<img src="Logo.png">
</div>

<div class="search-box">
<div class="search-row">
<input id="search" placeholder="Ex. Pikachu sv2a / OP01-120">
<button class="search-btn" onclick="prepare()">🔍</button>
</div>
</div>

<div class="tcg">
<button>Pokémon</button>
<button>One Piece</button>
<button>Magic</button>
<button>Dragon Ball</button>
<button>Star Wars</button>
<button>Lorcana</button>
</div>

<button class="btn" onclick="prepare()">Préparer la recherche</button>
<button class="btn" onclick="reset()">Réinitialiser</button>

<div class="status" id="status"></div>

</div>

<!-- RIGHT -->
<div class="panel">

<button class="btn" onclick="openCM()">🔎 Cardmarket</button>
<button class="btn" onclick="openEbay()">💰 eBay Sold</button>
<button class="btn" onclick="openJP()">🇯🇵 CardRush</button>
<button class="btn" onclick="openYuyu()">🇯🇵 Yuyutei</button>

<div class="result-box" id="result">
Aucune recherche préparée
</div>

<div class="convert">
<label>Conversion ¥ → €</label>
<input id="yen" placeholder="¥">
<input id="rate" value="160">
<div id="eur">— €</div>
</div>

</div>

</div>

<script>

let query = "";

function prepare(){
  query = document.getElementById("search").value;

  if(query){
    document.getElementById("status").innerText = "Recherche prête ✔️";
    document.getElementById("result").innerText = query;
  }
}

function reset(){
  document.getElementById("search").value="";
  document.getElementById("status").innerText="";
  document.getElementById("result").innerText="Aucune recherche préparée";
}

function build(){
  return encodeURIComponent(query + " pokemon card");
}

function openCM(){
  window.open("https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString=" + build());
}

function openEbay(){
  window.open("https://www.ebay.fr/sch/i.html?_nkw=" + build() + "&LH_Sold=1");
}

function openJP(){
  window.open("https://www.google.com/search?q=" + build() + "+cardrush");
}

function openYuyu(){
  window.open("https://www.google.com/search?q=" + build() + "+yuyutei");
}

/* conversion */
document.getElementById("yen").addEventListener("input", convert);
document.getElementById("rate").addEventListener("input", convert);

function convert(){
  let yen = document.getElementById("yen").value;
  let rate = document.getElementById("rate").value;

  if(yen && rate){
    document.getElementById("eur").innerText = (yen/rate).toFixed(2) + " €";
  }
}

</script>

</body>
</html>
