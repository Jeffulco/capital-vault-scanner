<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Vault</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f2f6b, #061733);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

.logo {
    margin-top: 20px;
    margin-bottom: 20px;
}

.logo img {
    width: 250px;
}

.search-box {
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 10px;
    transition: 0.3s;
}

.search-box.ready {
    border: 2px solid gold;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

.status {
    font-size: 12px;
    margin-bottom: 15px;
    opacity: 0.7;
}

.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid gold;
    background: transparent;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: rgba(255,215,0,0.1);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="https://i.imgur.com/8Km9tLL.png">
</div>

<div id="box" class="search-box">
<input id="search" placeholder="Ex. Pikachu sv2a / OP01-120 / Charizard sv3">
</div>

<div id="status" class="status"></div>

<button class="btn" onclick="openCM()">🔍 Cardmarket</button>
<button class="btn" onclick="openEbay()">💰 eBay Sold</button>
<button class="btn" onclick="openJP()">🇯🇵 CardRush</button>
<button class="btn" onclick="openYuyu()">🇯🇵 Yuyutei</button>

<div class="footer">
Conversion ¥ → € (base 160)
</div>

</div>

<script>

let query = "";

document.getElementById("search").addEventListener("input", function(){
    query = this.value.trim();

    if(query){
        document.getElementById("box").classList.add("ready");
        document.getElementById("status").innerText = "Recherche prête ✔️";
    } else {
        document.getElementById("box").classList.remove("ready");
        document.getElementById("status").innerText = "";
    }
});

function buildQuery(){
    return encodeURIComponent(query + " pokemon card");
}

function openCM(){
    window.open("https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString=" + buildQuery());
}

function openEbay(){
    window.open("https://www.ebay.fr/sch/i.html?_nkw=" + buildQuery() + "&LH_Sold=1&LH_Complete=1");
}

function openJP(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+cardrush");
}

function openYuyu(){
    window.open("https://www.google.com/search?q=" + buildQuery() + "+yuyutei");
}

</script>

</body>
</html>
